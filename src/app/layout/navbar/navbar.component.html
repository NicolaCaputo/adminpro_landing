<header class="h-14 flex items-center justify-between px-6 flex-shrink-0"
        style="background:#FFFFFF; border-bottom:1px solid rgba(64,37,22,0.08);">

  <!-- Title -->
  <div>
    <h1 class="text-[15px] font-semibold" style="color:#402516;">{{ titoloPagina }}</h1>
    <p class="text-[11px] mt-0.5" style="color:#6b3318;">{{ sottotitolo }}</p>
  </div>

  <!-- Actions -->
  <div class="flex items-center gap-1">

    <!-- Search -->
    <div class="relative hidden sm:block mr-2">
      <svg class="w-3.5 h-3.5 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none"
           style="color:#6b3318;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input type="text" placeholder="Cerca..."
             style="width:184px; padding:6px 12px 6px 32px; font-size:13px; background:#F7F6F5;
                    border:1px solid rgba(64,37,22,0.1); border-radius:8px; color:#402516;
                    outline:none; font-family:'Space Grotesk',sans-serif;"
             onfocus="this.style.borderColor='#0554F2'; this.style.boxShadow='0 0 0 3px rgba(5,84,242,0.1)'"
             onblur="this.style.borderColor='rgba(64,37,22,0.1)'; this.style.boxShadow='none'">
    </div>

    <!-- Notifiche -->
    <div class="relative dropdown-anchor">
      <button (click)="toggleNotifiche(); $event.stopPropagation()"
              class="relative w-8 h-8 flex items-center justify-center rounded-lg transition-colors"
              style="color:rgba(64,37,22,0.4);"
              onmouseenter="this.style.background='rgba(64,37,22,0.05)'; this.style.color='#402516'"
              onmouseleave="this.style.background=''; this.style.color='rgba(64,37,22,0.4)'">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
        <span *ngIf="nonLette > 0"
              class="absolute top-1.5 right-1.5 w-1.5 h-1.5 rounded-full"
              style="background:#0554F2;"></span>
      </button>

      <!-- Dropdown notifiche -->
      <div *ngIf="showNotifiche"
           class="dropdown-panel absolute right-0 mt-2 w-80 z-50 animate-fade-in">

        <div class="flex items-center justify-between px-4 py-3"
             style="border-bottom:1px solid rgba(64,37,22,0.07);">
          <div>
            <h3 class="text-[13px] font-semibold" style="color:#402516;">Notifiche</h3>
            <p class="text-[11px] mt-0.5" style="color:#6b3318;">{{ nonLette }} non lette</p>
          </div>
          <button *ngIf="nonLette > 0" (click)="segnaLettaTutte()"
                  class="text-[11px] font-semibold transition-colors"
                  style="color:#0554F2;"
                  onmouseenter="this.style.color='#0540F2'"
                  onmouseleave="this.style.color='#0554F2'">
            Tutte lette
          </button>
        </div>

        <div>
          <div *ngFor="let n of notifiche"
               (click)="segnaLetta(n, $event)"
               class="flex items-start gap-3 px-4 py-3 cursor-pointer transition-all"
               [style.background]="!n.letta ? 'rgba(5,84,242,0.04)' : 'transparent'"
               onmouseenter="this.style.background='rgba(64,37,22,0.03)'"
               onmouseleave="this.style.background=''">

            <div class="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0 mt-0.5"
                 [style.background]="!n.letta ? 'rgba(5,84,242,0.1)' : 'rgba(64,37,22,0.05)'"
                 [style.borderColor]="!n.letta ? 'rgba(5,84,242,0.2)' : 'rgba(64,37,22,0.1)'"
                 style="border-width:1px; border-style:solid;">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                   [style.color]="!n.letta ? '#0554F2' : 'rgba(64,37,22,0.35)'">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" [attr.d]="getIconaPath(n.icona)"/>
              </svg>
            </div>

            <div class="flex-1 min-w-0">
              <p class="text-[13px] leading-snug"
                 [style.color]="!n.letta ? '#402516' : 'rgba(64,37,22,0.4)'">{{ n.testo }}</p>
              <p class="text-[11px] mt-0.5" style="color:rgba(64,37,22,0.28);">{{ n.tempo }}</p>
            </div>

            <span *ngIf="!n.letta"
                  class="w-1.5 h-1.5 rounded-full flex-shrink-0 mt-1.5"
                  style="background:#0554F2;"></span>
          </div>
        </div>

        <div class="px-4 py-2.5 text-center"
             style="border-top:1px solid rgba(64,37,22,0.07);">
          <button class="text-[12px] font-medium transition-colors"
                  style="color:#6b3318;"
                  onmouseenter="this.style.color='#402516'"
                  onmouseleave="this.style.color='rgba(64,37,22,0.35)'">
            Vedi tutte le notifiche
          </button>
        </div>
      </div>
    </div>

    <!-- Divider -->
    <div class="w-px h-4 mx-1" style="background:rgba(64,37,22,0.1);"></div>

    <!-- Profilo -->
    <div class="relative dropdown-anchor">
      <button (click)="toggleProfilo(); $event.stopPropagation()"
              class="flex items-center gap-2 px-2 py-1.5 rounded-lg transition-all"
              style="border:1px solid transparent;"
              onmouseenter="this.style.background='rgba(64,37,22,0.04)'; this.style.borderColor='rgba(64,37,22,0.1)'"
              onmouseleave="this.style.background=''; this.style.borderColor='transparent'">
        <div class="w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold flex-shrink-0"
             style="background:rgba(5,84,242,0.1); color:#0554F2; border:1px solid rgba(5,84,242,0.2);">
          NC
        </div>
        <svg class="w-3 h-3" style="color:#6b3318;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>

      <!-- Dropdown profilo -->
      <div *ngIf="showProfilo"
           class="dropdown-panel absolute right-0 mt-2 w-56 z-50 animate-fade-in">

        <div class="px-4 py-3" style="border-bottom:1px solid rgba(64,37,22,0.07);">
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full flex items-center justify-center text-xs font-bold"
                 style="background:rgba(5,84,242,0.1); color:#0554F2; border:1px solid rgba(5,84,242,0.2);">
              NC
            </div>
            <div class="min-w-0">
              <p class="text-[13px] font-semibold truncate" style="color:#402516;">Nicola Caputo</p>
              <p class="text-[11px] truncate" style="color:#6b3318;">Amministratore</p>
            </div>
          </div>
        </div>

        <div class="p-1.5">
          <a routerLink="/impostazioni" class="dropdown-item rounded-lg">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            Il mio profilo
          </a>
          <a routerLink="/impostazioni" class="dropdown-item rounded-lg">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            Impostazioni
          </a>
          <div class="my-1" style="height:1px; background:rgba(64,37,22,0.07);"></div>
          <button class="dropdown-item danger rounded-lg w-full">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
            Esci dall'account
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
