<aside class="w-56 flex flex-col h-full flex-shrink-0"
       style="background:#5e2d0e; border-right:none;">

  <!-- Logo -->
  <div class="flex items-center gap-3 px-5 py-4"
       style="border-bottom:1px solid rgba(242,242,242,0.1);">
    <div class="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0"
         style="background:rgba(240,200,50,0.25); border:1px solid rgba(240,200,50,0.45);">
      <svg class="w-3.5 h-3.5" style="color:#f0d040;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
      </svg>
    </div>
    <div>
      <span class="text-[13.5px] font-bold tracking-tight" style="color:#F2F2F2;">AdminPro</span>
      <p class="text-[10px]" style="color:rgba(242,242,242,0.6); letter-spacing:0.06em;">ENTERPRISE</p>
    </div>
  </div>

  <!-- Nav -->
  <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">

    <p class="text-[10px] font-semibold uppercase tracking-widest px-3 mb-3"
       style="color:rgba(242,242,242,0.55); letter-spacing:0.1em;">Menu</p>

    <a *ngFor="let item of menuItems"
       [routerLink]="item.route"
       class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-[13.5px] font-medium transition-all cursor-pointer"
       [style.background]="isActive(item.route, item.exact) ? 'rgba(242,242,242,0.1)' : ''"
       [style.color]="isActive(item.route, item.exact) ? '#F2F2F2' : 'rgba(242,242,242,0.65)'"
       [style.borderColor]="isActive(item.route, item.exact) ? 'rgba(242,242,242,0.2)' : 'transparent'"
       [style.fontWeight]="isActive(item.route, item.exact) ? '600' : '400'"
       style="border-width:1px; border-style:solid;">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" [attr.d]="item.iconPath"/>
      </svg>
      {{ item.label }}
    </a>

    <div class="pt-4 pb-1">
      <p class="text-[10px] font-semibold uppercase tracking-widest px-3 mb-2.5"
         style="color:rgba(242,242,242,0.55); letter-spacing:0.1em;">Sistema</p>
    </div>

    <a *ngFor="let item of sistemaItems"
       [routerLink]="item.route"
       class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-[13.5px] font-medium transition-all cursor-pointer"
       [style.background]="isActive(item.route) ? 'rgba(242,242,242,0.1)' : ''"
       [style.color]="isActive(item.route) ? '#F2F2F2' : 'rgba(242,242,242,0.65)'"
       [style.borderColor]="isActive(item.route) ? 'rgba(242,242,242,0.2)' : 'transparent'"
       [style.fontWeight]="isActive(item.route) ? '600' : '400'"
       style="border-width:1px; border-style:solid;">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" [attr.d]="item.iconPath"/>
      </svg>
      {{ item.label }}
    </a>
  </nav>

  <!-- User footer -->
  <div class="px-3 py-3 user-menu-anchor relative"
       style="border-top:1px solid rgba(242,242,242,0.1);">

    <!-- Dropdown (upward) -->
    <div *ngIf="showUserMenu"
         class="absolute left-3 right-3 bottom-full mb-2 z-50 animate-fade-in rounded-xl overflow-hidden"
         style="background:#ffffff; border:1px solid rgba(64,37,22,0.12); box-shadow:0 -12px 32px rgba(64,37,22,0.15);">
      <div class="p-1.5">
        <a routerLink="/impostazioni" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-[13px] transition-all cursor-pointer"
           style="color:#402516;"
           onmouseenter="this.style.background='rgba(64,37,22,0.05)'; this.style.color='#402516'"
           onmouseleave="this.style.background=''; this.style.color='#402516'">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          Il mio profilo
        </a>
        <a routerLink="/impostazioni" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-[13px] transition-all cursor-pointer"
           style="color:#402516;"
           onmouseenter="this.style.background='rgba(64,37,22,0.05)'; this.style.color='#402516'"
           onmouseleave="this.style.background=''; this.style.color='#402516'">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          Impostazioni
        </a>
        <div style="height:1px; background:rgba(64,37,22,0.08); margin:4px 0;"></div>
        <button class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-[13px] transition-all"
                style="color:#c21f1f;"
                onmouseenter="this.style.background='rgba(194,31,31,0.07)'; this.style.color='#a01818'"
                onmouseleave="this.style.background=''; this.style.color='#c21f1f'">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Esci dall'account
        </button>
      </div>
    </div>

    <!-- Trigger -->
    <button (click)="toggleUserMenu(); $event.stopPropagation()"
            class="w-full flex items-center gap-3 px-3 py-2 rounded-lg transition-all"
            style="border:1px solid transparent;"
            onmouseenter="this.style.background='rgba(242,242,242,0.06)'; this.style.borderColor='rgba(242,242,242,0.1)'"
            onmouseleave="this.style.background=''; this.style.borderColor='transparent'">
      <div class="w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold flex-shrink-0"
           style="background:rgba(240,200,50,0.22); color:#f0d040; border:1px solid rgba(240,200,50,0.42);">
        NC
      </div>
      <div class="flex-1 min-w-0 text-left">
        <p class="text-[12.5px] font-medium truncate" style="color:rgba(242,242,242,0.75);">Nicola Caputo</p>
        <p class="text-[10px] truncate" style="color:rgba(242,242,242,0.55);">Amministratore</p>
      </div>
      <svg class="w-3 h-3 flex-shrink-0 transition-transform"
           [style.transform]="showUserMenu ? 'rotate(180deg)' : ''"
           style="color:rgba(242,242,242,0.55);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
      </svg>
    </button>
  </div>
</aside>

<style>
  .nav-item:hover {
    background: rgba(242,242,242,0.06) !important;
    color: #F2F2F2 !important;
  }
</style>
